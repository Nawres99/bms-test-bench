image: python:3.12-slim

stages:
  - test

before_script:
  - pip install -r requirements.txt

unit-tests:
  stage: test
  script:
    - pytest -v

bdd-scenarios:
  stage: test
  script:
    - behave --format progress

sample-report:
  stage: test
  script:
    - python tools/report.py samples/drive_cycle_log.csv -o report.html
  artifacts:
    paths:
      - report.html
    expire_in: 1 week
